name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      - name: Restore debug keystore
        run: echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > debug.keystore

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Rename APK with version
        run: cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Finance-Tracker_v4.0.4.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Finance-Tracker_v4.0.4
          path: app/build/outputs/apk/debug/Finance-Tracker_v4.0.4.apk          name: Finance-Tracker_v4.0.4
          path: app/build/outputs/apk/debug/Finance-Tracker_v4.0.4.apk      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Finance-Tracker_v4.0.4
          path: app/build/outputs/apk/debug/Finance-Tracker_v4.0.4.apk
